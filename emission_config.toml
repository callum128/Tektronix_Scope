[session.info]
name = "Callum Clausen"
email = "callum.clausen@pg.canterbury.ac.nz"
experiment_name = "Avg_step_waveform_merc_lamp_experiment"
experiment_description = "This is a test experiment"

[device.DPO7104_TekTronix_scope]
averages = 10
